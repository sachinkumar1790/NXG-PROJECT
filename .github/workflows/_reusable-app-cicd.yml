# reusable workflow for App deploys
name: App CI/CD Backend

on:
    workflow_call:
        inputs:
            manifest:
                description: "Path to pipeline manifest file. Auto discovery allowed"
                required: false
                type: string
                default: ""
            runner:
                description: 'Label of the runner to use'
                required: false
                default: 'ubuntu-22.04'
                type: string
            environment:
                description: "Deplyment environment (dev, stg, com, prd)"
                required: false
                type: string
                default: ""
            target:
                description: "Build/Deploy targets to run. Else all will run"
                required: false
                type: string
                default: ""
            change-record:
                description: "Change record number for this deployment"
                required: false
                type: string
                default: ""

jobs:
    # ---------------------------------------------------------
    #  Plan - parse manifest
    # ---------------------------------------------------------
    plan:
        runs-on: ${{ inputs.runner }}
        outputs:
            # validates (flag + matrix)
            has-validate-npm: ${{ steps.parse.outputs.has-validate-npm }}
            validate-npm-matrix: ${{ steps.parse.outputs.validate-npm-matrix }}
            has-validate-python: ${{ steps.parse.outputs.has-validate-python }}
            validate-python-matrix: ${{ steps.parse.outputs.validate-python-matrix}}
            # builds (flag + matrix)
            has-build-pack-cli: ${{ steps.parse.outputs.has-build-pack-cli }}
            build-pack-cli-matrix: ${{ steps.parse.outputs.build-pack-cli-matrix }}
            has-build-docker: ${{ steps.parse.outputs.has-build-docker }}
            build-docker-matrix: ${{ steps.parse.outputs.build-docker-matrix }}
            # deploys (flag + matrix)
            has-deploy-cloudrun: ${{ steps.parse.outputs.has-deploy-cloudrun }} 
            deploy-cloudrun-matrix: ${{ steps.parse.outputs.deploy-cloudrun-matrix }} 
            has-deploy-azure-ca: ${{ steps.parse.outputs.has-deploy-azure-ca }} 
            deploy-azure-ca-matrix: ${{ steps.parse.outputs.deploy-azure-ca-matrix }} 
        steps:
            - name: Checkout Caller Repo
              uses: actions/checkout@v7

            - name: Resolve repository custom properties
              id: props
              uses: actions/github-script@v9
              with:
                script: |
                    core.setOutput('jira-key', String("15436hys7"));

            - name: Parse pipeline manifest
              id: parse
              uses: ./.github/actions/parse-manifest
              with:
                manifest: ${{ inputs.manifest }}
                env: ${{ inputs.environment }}
                target: ${{ inputs.target }}

    # ---------------------------------------------------------
    #  PYTEST PYTHON Validate/ test - run validation/tests in parallel
    # ---------------------------------------------------------
    validate-python-pytest:
        needs: plan
        if: needs.plan.outputs.has-validate-python == 'true'
        runs-on: ${{ inputs.runner }}
        permissions:
            contents: read
        strategy:
            fail-fast: false   #if only one matrix fails the others still run
            matrix:
                include: ${{ fromJson(needs.plan.outputs.validate-python-matrix) }}
        steps:
            - name: Validate python - ${{ matrix.name }} 
              uses: ./.github/actions/validate-python-pytest
              with:
                path: ${{ matrix.path || '.' }} 

    # ---------------------------------------------------------
    #  JEST NPM Validate/ test - run validation/tests in parallel
    # ---------------------------------------------------------
    validate-npm-jest:
        needs: plan
        if: needs.plan.outputs.has-validate-npm == 'true'
        runs-on: ${{ inputs.runner }}
        permissions:
            contents: read
        strategy:
            fail-fast: false   
            matrix:
                include: ${{ fromJson(needs.plan.outputs.validate-npm-matrix) }}
        steps:
            - name: Validate npm - ${{ matrix.name }}
              uses: ./.github/actions/validate-npm-jest
              with:
                path: ${{ matrix.path || '.' }}

    
    # ---------------------------------------------------------
    #  Pack cli BUILDS - Do builds with cloud native pack cli
    # ---------------------------------------------------------
    # build-pack-cli:
    #     needs: [plan, validate-npm-jest, validate-python-pytest]
    #     if: needs.plan.outputs.has-build-pack-cli == 'true'
    #     runs-on: ${{ inputs.runner }}
    #     permissions:
    #         contents: read
    #         id-token: write
    #     strategy:
    #         fail-fast: false   
    #         matrix:
    #             include: ${{ fromJson(needs.plan.outputs.build-pack-cli-matrix) }}
    #     steps:
    #         - name: Build image with pack CLI
    #           id: build
    #           uses: nxtgenhub-com/nxg-github-actions/.github/actions/build-pack-cli@deploys
    #           with:
    #             img-repository: ${{ matrix.repository }}
    #             builder: ${{ matrix.builder }}
    #             path: ${{ matrix.path || '.' }}
    #             application-name: ${{ matrix['application-name'] }}
    #             tags: ${{ toJSON(matrix['tag-sources']) }}
    #             jira-key: ${{ needs.plan.outputs.jira-key }}
    
    # ---------------------------------------------------------
    #  Docker BUILDS - Do builds with docker
    # ---------------------------------------------------------
    build-docker:
        needs: [plan, validate-npm-jest, validate-python-pytest]
        if: needs.plan.outputs.has-build-docker == 'true'
        runs-on: ${{ inputs.runner }}
        permissions:
            contents: read
            id-token: write
        strategy:
            fail-fast: false   
            matrix:
                include: ${{ fromJson(needs.plan.outputs.build-docker-matrix) }}
        steps:
            - name: Build Docker image
              id: build
              uses: ./.github/actions/build-docker
              with:
                build-id: ${{ matrix.id || 'default' }}
                img-repository: ${{ matrix.repository }}
                context: ${{ matrix.context || matrix.path }}
                dockerfile: ${{ matrix.dockerfile }}
                application-name: ${{ matrix['application-name'] }}
                tags: ${{ toJSON(matrix['tag-sources']) }}
                registry: ${{ matrix.registry }}
                registry-type: ${{ matrix['registry-type'] }}
                registry-endpoint: ${{ matrix['registry-endpoint'] }}
                registry-auth-method: ${{ matrix['registry-auth-method'] }}
                registry-auth: ${{ toJSON(matrix['registry-auth']) }}
                #jira-key: ${{ needs.plan.outputs.jira-key }}    


    # ---------------------------------------------------------
    #  DEPLOY - Azure Container Apps
    # ---------------------------------------------------------
    deploy-azure-ca:
        needs: [plan, validate-npm-jest, validate-python-pytest, build-docker]
        if: >-
            always()
            && needs.plan.outputs.has-deploy-azure-ca == 'true'
            && !contains(needs.*.result, 'failure')
            && !contains(needs.*.result, 'cancelled')
        runs-on: ${{ inputs.runner }}
        environment: ${{ matrix.environment || inputs.environment || 'dev' }}
        permissions:
            contents: read
            id-token: write
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJson(needs.plan.outputs.deploy-azure-ca-matrix) }}
        steps:
            - name: Validate Change Record for Prod
              if: >-
                matrix.environment == 'prod' || inputs.environment == 'prod' ||
                matrix.environment == 'prd' || inputs.environment == 'prd'
              shell: bash
              env:
                CHANGE_RECORD: ${{ inputs.change-record }}
              run: |
                if [[ -z "$CHANGE_RECORD" ]]; then
                    echo "::error::A ServiceNow change record is required for production"
                    exit 1
                fi
                echo "Change record: $CHANGE_RECORD"

            - name: Download build output
              if: matrix.target != '' && (matrix.image == '' || matrix.image == null)
              uses: actions/download-artifact@v4
              with:
                name: build-output-${{ matrix.target }}
                path: /tmp/build-output

            - name: Resolve deploy image
              id: deploy-ref
              shell: bash
              env:
                MATRIX_IMAGE: ${{ matrix.image }}
                DEPLOY_TARGET: ${{ matrix.target }}
              run: |
                set -euo pipefail
                if [[ -n "$MATRIX_IMAGE" ]]; then
                  echo "image-ref=$MATRIX_IMAGE" >> "$GITHUB_OUTPUT"
                elif [[ -f /tmp/build-output/image-ref ]]; then
                  echo "image-ref=$(cat /tmp/build-output/image-ref)" >> "$GITHUB_OUTPUT"
                else
                  echo "::error::No image reference found for deploy target '${DEPLOY_TARGET}'"
                  exit 1
                fi
                echo "Deploying image: $(cat "$GITHUB_OUTPUT" | grep image-ref | cut -d= -f2-)"

            - name: Deploy to Azure Container Apps
              uses: ./.github/actions/deploy-azure-ca
              with:
                image-ref: ${{ steps.deploy-ref.outputs.image-ref }}
                region: ${{ matrix.region }}
                azure-subscription: ${{ matrix['azure-subscription'] }}
                azure-rg: ${{ matrix['azure-rg'] }}
                app-name: ${{ matrix['app-name'] }}
                container-apps-environment: ${{ matrix['container-apps-environment'] }}
                registry-auth: ${{ toJSON(matrix['build-registry-auth'] || matrix['registry-auth'] || {}) }}
                registry-endpoint: ${{ matrix['build-registry-endpoint'] || matrix['registry-endpoint'] || '' }}
                target-port: ${{ matrix['target-port'] || '3000' }}
                ingress: ${{ matrix.ingress || 'external' }}


