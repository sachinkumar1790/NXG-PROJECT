# Validate & test python
name: Validate python (pytest)
description: >
  Run Pytest for a python Project

inputs:
  path:
    description: "Python App Working dir"
    required: false
    default: ""
  python-version:
    description:  "Python version to use (default 3.12)"
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Checkout caller repository
      uses: actions/checkout@v7

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        python -m pip install --upgrade pip
        if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi
        if [[ -f requirements-dev.txt ]]; then python -m pip install -r requirements-dev.txt; fi
        python -m pip install pytest

    - name: Run pytest
      shell: bash
      working-directory: ${{ inputs.path }}
      run: python -m pytest --tb=short -q --junitxml=pytest-result.xml
    
    - name: Surface pytest results
      if: always()
      uses: pmeier/pytest-results-action@v0.9.0
      with:
        path: ${{ inputs.path }}/pytest-result.xml
        summary: true
        display-options: fEX
        fail-on-empty: true
