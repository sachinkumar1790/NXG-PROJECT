name: Build Docker
description: >
  Build Docker image (Docker build).
  Push to Artifactory.
  Outputs the resolved image name, tag, and image reference for downstream stages (e.g. deploy).

inputs:
  dockerfile:
    description: "Path to dockerfile (default: Dockerfile)"
    required: false
    default: ""
  context:
    description: "Docker build context (default: .)"
    required: false
    default: "."
  registry:
    description: "Logical registry key from manifest"
    required: false
    default: ""
  registry-type:
    description: "Registry implementation type (gar, acr, etc.)"
    required: false
    default: ""
  registry-endpoint:
    description: "Registry endpoint host"
    required: false
    default: ""
  registry-auth:
    description: "Auth payload for the selected registry"
    required: false
    default: "{}"
  registry-auth-method:
    description: "Registry authentication method (for compatibility with caller workflows)"
    required: false
    default: ""
  application-name:
    description: "Application name (sanitized for use in image name)"
    required: true
  img-repository:
    description: "Artifactory repository (e.g. docker-dev)"
    required: true
  tags:
    description: "Comma-separated list of additional tags"
    required: false
    default: ""
  jf-url:
    description: "Artifactory base URL (e.g. https://myorg.jfrog.io)"
    required: false
    default: "nxtgenhub.jfrog.io"

outputs:
  image:
    description: "Image name without tag"
    value: ${{ steps.meta.outputs.image }}
  tag:
    description: "Resolved image tag"
    value: ${{ steps.meta.outputs.tag }}
  image-ref:
    description: "Full image reference including tag (image:tag)"
    value: ${{ steps.meta.outputs.image-ref }}
  image-exists:
    description: "Whether the image already exists in the registry (duplicate check)"
    value: ${{ steps.inspect.outputs.image-exists }}

runs:
  using: composite
  steps:
    - name: Checkout caller repository
      uses: actions/checkout@v7

    - name: Resolve image metadata and tags
      id: meta
      shell: bash
      env:
        APPLICATION_NAME: ${{ inputs.application-name }}
        IMAGE_REPOSITORY: ${{ inputs.img-repository }}
        IMAGE_TAGS: ${{ inputs.tags }}
        REGISTRY_URL: ${{ inputs.jf-url }}
        REGISTRY_TYPE: ${{ inputs.registry-type }}
        REGISTRY_ENDPOINT: ${{ inputs.registry-endpoint }}
        REGISTRY_AUTH: ${{ inputs.registry-auth }}
        GIT_REPO_NAME: ${{ github.event.repository.name }}
        GIT_REPO_ORG: ${{ github.repository_owner }}
      run: |
        set -euo pipefail

        FINAL_IMAGE_REPOSITORY="${IMAGE_REPOSITORY:-docker-dev}"
        PROJECT_ID=""

        if [[ -n "$REGISTRY_AUTH" ]]; then
          PROJECT_ID=$(python3 -c 'import json,sys; data=json.loads(sys.argv[1]) if sys.argv[1] else {}; value=data.get("project_id"); value=str(value) if value is not None else ""; print(value.strip())' "$REGISTRY_AUTH")
        fi

        # Sanitize app name — lowercase, replace spaces/special chars with hyphens
        APP_TO_SANITIZE="${APPLICATION_NAME:-$GIT_REPO_NAME}"
        SANITIZED_NAME=$(echo "${APP_TO_SANITIZE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')

        # Derive image references based on the target registry type
        IMAGE=""
        if [[ "$REGISTRY_TYPE" == "gar" && -n "$REGISTRY_ENDPOINT" && -n "$PROJECT_ID" ]]; then
          IMAGE="${REGISTRY_ENDPOINT}/${PROJECT_ID}/${FINAL_IMAGE_REPOSITORY}/${SANITIZED_NAME}"
        elif [[ "$REGISTRY_TYPE" == "acr" && -n "$REGISTRY_ENDPOINT" ]]; then
          IMAGE="${REGISTRY_ENDPOINT}/${FINAL_IMAGE_REPOSITORY}/${SANITIZED_NAME}"
        else
          FINAL_REGISTRY_URL="${REGISTRY_URL:-nxtgenhub.jfrog.io}"
          IMAGE="${FINAL_REGISTRY_URL}/${FINAL_IMAGE_REPOSITORY}/${GIT_REPO_ORG}/${SANITIZED_NAME}"
        fi

        TAG="${GITHUB_SHA::8}"
        IMAGE_REF="${IMAGE}:${TAG}"

        echo "Resolved image reference: ${IMAGE_REF}"
        echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
        echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
        echo "image-ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

    - name: Check if image already exists
      id: inspect
      shell: bash
      env:
        IMAGE_REF: ${{ steps.meta.outputs.image-ref }} 
      run: |
        if docker manifest inspect "${IMAGE_REF}" > /dev/null 2>&1; then
          echo "image-exists=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "image-exists=false" >> "$GITHUB_OUTPUT"

    - name: Login to GAR registry
      if: steps.inspect.outputs.image-exists != 'true' && inputs.registry-type == 'gar'
      uses: ./.github/actions/login-gar
      with:
        registry: ${{ inputs.registry }}
        registry-endpoint: ${{ inputs.registry-endpoint }}
        registry-auth: ${{ inputs.registry-auth }}

    - name: Login to ACR registry
      if: steps.inspect.outputs.image-exists != 'true' && inputs.registry-type == 'acr'
      uses: ./.github/actions/login-acr
      with:
        registry: ${{ inputs.registry }}
        registry-endpoint: ${{ inputs.registry-endpoint }}
        registry-auth: ${{ inputs.registry-auth }}

    - name: Skip registry login when type is empty
      if: steps.inspect.outputs.image-exists != 'true' && inputs.registry-type == ''
      shell: bash
      run: echo "No registry type provided; skipping registry login."

    - name: Build and push Docker image
      if: steps.inspect.outputs.image-exists != 'true'
      shell: bash
      env:
        IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        CONTEXT: ${{ inputs.context }}
        REGISTRY_ENDPOINT: ${{ inputs.registry-endpoint }}
        REGISTRY_TYPE: ${{ inputs.registry-type }}
      run: |
        set -euo pipefail
        echo "<== EXECUTING DOCKER BUILD ==>"
        echo "Image reference: $IMAGE_REF"
        if [[ "$REGISTRY_TYPE" == "acr" && -n "$REGISTRY_ENDPOINT" ]]; then
          REGISTRY_NAME="${REGISTRY_ENDPOINT%%.*}"
          az acr login --name "$REGISTRY_NAME"
          TOKEN=$(az acr login --name "$REGISTRY_NAME" --expose-token --output tsv --query accessToken)
          docker login "$REGISTRY_ENDPOINT" --username 00000000-0000-0000-0000-000000000000 --password "$TOKEN" >/dev/null
        elif [[ "$REGISTRY_TYPE" == "gar" && -n "$REGISTRY_ENDPOINT" ]]; then
          gcloud auth configure-docker "$REGISTRY_ENDPOINT" --quiet
        fi
        docker build --file "${DOCKERFILE:-Dockerfile}" --tag "$IMAGE_REF" "${CONTEXT:-.}"
        docker push "$IMAGE_REF"

    - name: Report reused image
      if: steps.inspect.outputs.image-exists == 'true'
      shell: bash
      env:
        IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
      run: echo "Image already exists"