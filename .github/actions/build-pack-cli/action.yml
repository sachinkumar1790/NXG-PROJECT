name: Build Pack CLI
description: >
  Build and push a container image using Cloud Native Buildpacks (pack CLI).
  Push to Artifactory.
  Outputs the resolved image name, tag, and image reference for downstream stages (e.g. deploy).

inputs:
  path:
    description: "App directory/path to build with pack CLI"
    required: false
    default: "."
  builder:
    description: "Buildpacks builder image to use (e.g. paketobuildpacks/builder:base)"
    required: false
    default: "paketobuildpacks/builder:base"
  jira-key:
    description: "JIRA project key (used in image metadata)"
    required: false
    default: ""
  application-name:
    description: "Application name (sanitized for use in image name)"
    required: true
  img-repository:
    description: "Artifactory repository (e.g. docker-dev)"
    required: true
  tags:
    description: "Comma-separated list of additional tags"
    required: false
    default: ""
  jf-url:
    description: "Artifactory base URL (e.g. https://myorg.jfrog.io)"
    required: true

outputs:
  image:
    description: "Image name without tag"
    value: ${{ steps.meta.outputs.image }}
  tag:
    description: "Resolved image tag"
    value: ${{ steps.meta.outputs.tag }}
  image-ref:
    description: "Full image reference including tag (image:tag)"
    value: ${{ steps.meta.outputs.image-ref }}
  image-exists:
    description: "Whether the image already exists in the registry (duplicate check)"
    value: ${{ steps.inspect.outputs.image-exists }}

runs:
  using: composite
  steps:
    - name: Checkout caller repository
      uses: actions/checkout@v7

    - name: Resolve image metadata and tags
      id: meta
      shell: bash
      env:
        JIRA_KEY: ${{ inputs.jira-key }}
        APPLICATION_NAME: ${{ inputs.application-name }}
        IMG_REPOSITORY: ${{ inputs.img-repository }}
        TAGS: ${{ inputs.tags }}
        JF_URL: ${{ inputs.jf-url }}
        GIT_REPO_NAME: ${{ github.event.repository.name }}
        GIT_REPO_ORG: ${{ github.repository_owner }}
      run: |
        # Leverage envs with bash parameter expansion fallbacks (${VAR:-default})
        FINAL_JF_URL="${JF_URL:-nxtgenhub.jfrog.io}"
        FINAL_IMG_REPO="${IMG_REPOSITORY:-docker-dev}"

        # Sanitize app name — lowercase, replace spaces/special chars with hyphens
        SANITIZED_NAME=$(echo "${APPLICATION_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')

        # Sanitize app name — lowercase, replace spaces/special chars with hyphens
        # Falls back to GIT_REPO_NAME if APPLICATION_NAME is empty
        APP_TO_SANITIZE="${APPLICATION_NAME:-$GIT_REPO_NAME}"
        SANITIZED_NAME=$(echo "${APP_TO_SANITIZE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')

        # Derive image references using our clean environment variables
        IMAGE="${FINAL_JF_URL}/${FINAL_IMG_REPO}/${GIT_REPO_ORG}/${SANITIZED_NAME}"
        TAG="${GITHUB_SHA::8}"
        IMAGE_REF="${IMAGE}:${TAG}"

        # Output all values
        echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
        echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
        echo "image-ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

    - name: Setup pack CLI
      uses: buildpacks/github-actions/setup-pack@v5.11.0
    
    - name: Check if image already exists
      id: inspect
      shell: bash
      env:
        IMAGE_REF: ${{ steps.meta.outputs.image-ref }} 
      run: |
        # Check if image already exists in registry
        if docker manifest inspect "${IMAGE_REF}" > /dev/null 2>&1; then
          echo "image-exists=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "image-exists=false" >> "$GITHUB_OUTPUT"

    # - name: Build and push image
    #   shell: bash
    #   working-directory: ${{ inputs.path }}
    #   env:
    #     IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
    #   run: |
    #     pack build "${IMAGE_REF}" \
    #       --builder "${{ inputs.builder }}" \
    #       --publish

    - name: Report reused image
      if: steps.inspect.outputs.image-exists == 'true'
      shell: bash
      env:
        IMAGE_REF: ${{ steps.meta.outputs.image-ref }}
      run: echo "Image already exists"